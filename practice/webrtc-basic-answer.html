<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC 연습 - 정답</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .info {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #4caf50;
    }
    
    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #fafafa;
      border-radius: 8px;
    }
    
    .section h2 {
      color: #555;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    
    .video-box {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    video {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    
    .video-label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 14px;
    }
    
    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #388e3c;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .log {
      background: #263238;
      color: #aed581;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 10px;
    }
    
    .log-entry {
      margin-bottom: 5px;
    }
    
    .log-time {
      color: #90caf9;
    }
    
    .log-warn {
      color: #ffb74d;
    }
    
    .log-error {
      color: #e57373;
    }
    
    input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      width: 300px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ WebRTC 기본 연습 - 정답 파일</h1>
    
    <div class="info">
      <strong>📚 이 파일은 정답이 구현된 버전입니다.</strong>
      <br><br>
      막혔을 때 참고용으로 사용하세요!
    </div>

    <div class="section">
      <h2>📹 STEP 1: 카메라/마이크 획득</h2>
      <button id="getMediaBtn">카메라 켜기</button>
      
      <div class="videos">
        <div class="video-box">
          <div class="video-label">내 영상 (Local)</div>
          <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="video-box">
          <div class="video-label">상대방 영상 (Remote)</div>
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>🔗 STEP 2: PeerConnection 생성 & 트랙 추가</h2>
      <button id="createPCBtn" disabled>PeerConnection 생성</button>
    </div>

    <div class="section">
      <h2>📤 STEP 3: Offer 생성 (연결 시작하는 쪽)</h2>
      <button id="createOfferBtn" disabled>Offer 생성</button>
      <button id="copyOfferBtn" disabled>Offer 복사</button>
      <textarea id="offerDisplay" readonly style="width: 100%; height: 100px; margin-top: 10px; padding: 10px; font-family: monospace; font-size: 12px;"></textarea>
    </div>

    <div class="section">
      <h2>📥 STEP 4: Offer 받기 & Answer 생성</h2>
      <div style="margin-bottom: 15px;">
        <label>상대방의 Offer 붙여넣기:</label><br>
        <textarea id="offerInput" placeholder="여기에 상대방의 Offer를 붙여넣으세요..." style="width: 100%; height: 100px; margin-top: 5px; padding: 10px; font-family: monospace; font-size: 12px;"></textarea>
      </div>
      <button id="receiveOfferBtn" disabled>Offer 받기</button>
      <button id="createAnswerBtn" disabled>Answer 생성</button>
      <button id="copyAnswerBtn" disabled>Answer 복사</button>
      <textarea id="answerDisplay" readonly style="width: 100%; height: 100px; margin-top: 10px; padding: 10px; font-family: monospace; font-size: 12px;"></textarea>
    </div>

    <div class="section">
      <h2>✅ STEP 5: Answer 받기 (연결 완료)</h2>
      <div style="margin-bottom: 15px;">
        <label>상대방의 Answer 붙여넣기:</label><br>
        <textarea id="answerInput" placeholder="여기에 상대방의 Answer를 붙여넣으세요..." style="width: 100%; height: 100px; margin-top: 5px; padding: 10px; font-family: monospace; font-size: 12px;"></textarea>
      </div>
      <button id="receiveAnswerBtn" disabled>Answer 받기</button>
    </div>

    <div class="section">
      <h2>📊 실시간 로그</h2>
      <button onclick="clearLog()">로그 지우기</button>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    // =====================================================
    // 전역 변수
    // =====================================================
    let localStream = null;
    let pc = null;
    
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const getMediaBtn = document.getElementById('getMediaBtn');
    const createPCBtn = document.getElementById('createPCBtn');
    const createOfferBtn = document.getElementById('createOfferBtn');
    const receiveOfferBtn = document.getElementById('receiveOfferBtn');
    const createAnswerBtn = document.getElementById('createAnswerBtn');
    const receiveAnswerBtn = document.getElementById('receiveAnswerBtn');

    // =====================================================
    // 로그 함수
    // =====================================================
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'log-error' : type === 'warn' ? 'log-warn' : '';
      logDiv.innerHTML += `<div class="log-entry ${className}"><span class="log-time">[${time}]</span> ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(`[${time}] ${message}`);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // =====================================================
    // ✅ 정답 1: 미디어 획득
    // =====================================================
    async function getMedia() {
      try {
        log('🎥 카메라/마이크 권한 요청 중...');
        
        // ✅ getUserMedia로 카메라/마이크 획득
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });
        
        // 내 비디오에 연결
        localVideo.srcObject = localStream;
        
        log('✅ 카메라/마이크 획득 성공!');
        log(`📹 비디오 트랙: ${localStream.getVideoTracks().length}개`);
        log(`🎤 오디오 트랙: ${localStream.getAudioTracks().length}개`);
        
        createPCBtn.disabled = false;
        getMediaBtn.disabled = true;
        
      } catch (error) {
        log(`❌ 미디어 획득 실패: ${error.message}`, 'error');
      }
    }

    // =====================================================
    // ✅ 정답 2: PeerConnection 생성
    // =====================================================
    function createPeerConnection() {
      try {
        log('🔗 PeerConnection 생성 중...');
        
        // ✅ PeerConnection 생성
        pc = new RTCPeerConnection({
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' }
          ]
        });
        
        log('✅ PeerConnection 생성 완료');
        
        // ✅ 트랙 추가
        localStream.getTracks().forEach(track => {
          pc.addTrack(track, localStream);
          log(`➕ 트랙 추가: ${track.kind}`);
        });
        
        log('✅ 로컬 트랙 추가 완료');
        
        // ✅ 이벤트 리스너 등록
        
        // 1) ICE Candidate 이벤트
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            log(`🗺️ ICE Candidate 발견: ${event.candidate.type} (${event.candidate.candidate.split(' ')[7]})`);
          } else {
            log('✅ ICE Candidate 수집 완료');
          }
        };
        
        // 2) 상대방 트랙 수신 이벤트
        pc.ontrack = (event) => {
          log(`📹 상대방 트랙 수신: ${event.track.kind}`);
          remoteVideo.srcObject = event.streams[0];
          log('✅ 상대방 영상이 화면에 표시됩니다! 🎉');
        };
        
        // 3) 연결 상태 변화 이벤트
        pc.onconnectionstatechange = () => {
          log(`🔌 연결 상태: ${pc.connectionState}`);
          if (pc.connectionState === 'connected') {
            log('🎉 P2P 연결 완료! WebRTC 통화가 시작되었습니다!');
          }
        };
        
        // 4) ICE 연결 상태 변화
        pc.oniceconnectionstatechange = () => {
          log(`🧊 ICE 연결 상태: ${pc.iceConnectionState}`);
        };
        
        log('✅ 이벤트 리스너 등록 완료');
        
        createOfferBtn.disabled = false;
        receiveOfferBtn.disabled = false;
        createPCBtn.disabled = true;
        
      } catch (error) {
        log(`❌ PeerConnection 생성 실패: ${error.message}`, 'error');
      }
    }

    // =====================================================
    // ✅ 정답 3: Offer 생성
    // =====================================================
    async function createOffer() {
      try {
        log('📤 Offer 생성 중...');
        
        // ✅ Offer 생성
        const offer = await pc.createOffer();
        log('✅ Offer 생성 완료');
        
        // ✅ Local Description 설정
        await pc.setLocalDescription(offer);
        log('✅ Local Description 설정 완료 (ICE 수집 시작!)');
        
        log('📋 Offer를 복사해서 상대방에게 전달하세요');
        
        document.getElementById('offerDisplay').value = JSON.stringify(offer, null, 2);
        document.getElementById('copyOfferBtn').disabled = false;
        receiveAnswerBtn.disabled = false;
        
      } catch (error) {
        log(`❌ Offer 생성 실패: ${error.message}`, 'error');
      }
    }

    // =====================================================
    // ✅ 정답 4: Offer 받기 & Answer 생성
    // =====================================================
    async function receiveOffer() {
      try {
        log('📥 Offer 수신 중...');
        
        const offerText = document.getElementById('offerInput').value.trim();
        if (!offerText) {
          throw new Error('Offer를 입력해주세요!');
        }
        
        // ✅ JSON 파싱
        const offer = JSON.parse(offerText);
        log('✅ Offer 파싱 완료');
        
        // ✅ Remote Description 설정
        await pc.setRemoteDescription(offer);
        log('✅ Remote Description 설정 완료');
        log('👤 상대방의 미디어 스펙을 알게 되었습니다');
        
        createAnswerBtn.disabled = false;
        receiveOfferBtn.disabled = true;
        
      } catch (error) {
        log(`❌ Offer 수신 실패: ${error.message}`, 'error');
      }
    }

    async function createAnswer() {
      try {
        log('📤 Answer 생성 중...');
        
        // ✅ Answer 생성
        const answer = await pc.createAnswer();
        log('✅ Answer 생성 완료');
        
        // ✅ Local Description 설정
        await pc.setLocalDescription(answer);
        log('✅ Local Description 설정 완료 (ICE 수집 시작!)');
        
        log('📋 Answer를 복사해서 상대방에게 전달하세요');
        
        document.getElementById('answerDisplay').value = JSON.stringify(answer, null, 2);
        document.getElementById('copyAnswerBtn').disabled = false;
        
      } catch (error) {
        log(`❌ Answer 생성 실패: ${error.message}`, 'error');
      }
    }

    // =====================================================
    // ✅ 정답 5: Answer 받기
    // =====================================================
    async function receiveAnswer() {
      try {
        log('📥 Answer 수신 중...');
        
        const answerText = document.getElementById('answerInput').value.trim();
        if (!answerText) {
          throw new Error('Answer를 입력해주세요!');
        }
        
        // ✅ JSON 파싱
        const answer = JSON.parse(answerText);
        log('✅ Answer 파싱 완료');
        
        // ✅ Remote Description 설정
        await pc.setRemoteDescription(answer);
        log('✅ Remote Description 설정 완료');
        log('👤 상대방의 미디어 스펙을 알게 되었습니다');
        log('🎉 WebRTC 연결 협상 완료! ICE가 최적 경로를 찾는 중...');
        
        receiveAnswerBtn.disabled = true;
        
      } catch (error) {
        log(`❌ Answer 수신 실패: ${error.message}`, 'error');
      }
    }

    // =====================================================
    // 복사 기능
    // =====================================================
    function copyOffer() {
      const offerText = document.getElementById('offerDisplay').value;
      navigator.clipboard.writeText(offerText);
      log('📋 Offer가 클립보드에 복사되었습니다');
    }

    function copyAnswer() {
      const answerText = document.getElementById('answerDisplay').value;
      navigator.clipboard.writeText(answerText);
      log('📋 Answer가 클립보드에 복사되었습니다');
    }

    // =====================================================
    // 이벤트 리스너
    // =====================================================
    getMediaBtn.addEventListener('click', getMedia);
    createPCBtn.addEventListener('click', createPeerConnection);
    createOfferBtn.addEventListener('click', createOffer);
    document.getElementById('copyOfferBtn').addEventListener('click', copyOffer);
    receiveOfferBtn.addEventListener('click', receiveOffer);
    createAnswerBtn.addEventListener('click', createAnswer);
    document.getElementById('copyAnswerBtn').addEventListener('click', copyAnswer);
    receiveAnswerBtn.addEventListener('click', receiveAnswer);

    // =====================================================
    // 초기 로그
    // =====================================================
    log('✅ WebRTC 정답 파일입니다');
    log('💡 "카메라 켜기" 버튼을 눌러 시작하세요');
  </script>
</body>
</html>
